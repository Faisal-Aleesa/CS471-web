{% extends "layouts/base.html" %}

{% block title %} Lab9 Task1 {% endblock %}

{% block content %}
<h2>Books Availability</h2>
<table border="1" cellpadding="10">
    <tr>
        <th>Title</th>
        <th>Quantity</th>
        <th>Availability %</th>
    </tr>
    {% for book in books %}
    <tr>
        <td>{{ book.title }}</td>
        <td>{{ book.quantity }}</td>
        <td>{{ book.percentage }}%</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
