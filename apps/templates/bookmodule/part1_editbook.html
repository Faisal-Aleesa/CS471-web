{% extends "layouts/base.html" %}

{% block title %} Edit Book {% endblock %}

{% block content %}
<h2>Edit Book</h2>
<form method="post">
    {% csrf_token %}
    <label>Title:</label>
    <input type="text" name="title" value="{{ book.title }}" required><br><br>
    <label>Price:</label>
    <input type="number" name="price" step="0.01" value="{{ book.price }}" required><br><br>
    <label>Quantity:</label>
    <input type="number" name="quantity" value="{{ book.quantity }}" required><br><br>
    <label>Rating:</label>
    <input type="number" name="rating" min="1" max="5" value="{{ book.rating }}" required><br><br>
    <button type="submit">Save Changes</button>
    <a href="{% url 'part1_listbooks' %}">Cancel</a>
</form>
{% endblock %}
