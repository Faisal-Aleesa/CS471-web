{% extends "layouts/base.html" %}

{% block title %} Lab9 Task3 {% endblock %}

{% block content %}
<h2>Oldest Book per Publisher</h2>
<table border="1" cellpadding="10">
    <tr>
        <th>Publisher</th>
        <th>Oldest Book Date</th>
    </tr>
    {% for pub in publishers %}
    <tr>
        <td>{{ pub.name }}</td>
        <td>{{ pub.oldest_pubdate }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
